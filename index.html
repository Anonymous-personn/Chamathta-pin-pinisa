<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Supiri Animation</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(-45deg, #ff6b6b, #f7d794, #1e90ff, #2ecc71);
      background-size: 400% 400%;
      animation: gradientBG 10s ease infinite;
      font-family: Arial, sans-serif;
    }

    @keyframes gradientBG {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    h1 {
      font-size: 3em;
      color: white;
      text-shadow: 0 0 20px #000;
      overflow: hidden;
      border-right: .15em solid #fff;
      white-space: nowrap;
      animation: typing 4s steps(30, end), blink-caret .75s step-end infinite;
    }

    @keyframes typing {
      from { width: 0 }
      to { width: 100% }
    }

    @keyframes blink-caret {
      from, to { border-color: transparent }
      50% { border-color: white; }
    }

    .glow-btn {
      margin-top: 20px;
      background: #111;
      color: #fff;
      border: none;
      padding: 12px 24px;
      font-size: 18px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }
    .glow-btn:hover {
      box-shadow: 0 0 20px #00ffcc;
      transform: scale(1.1);
    }
  </style>
</head>
<body>
  <div>
    <h1>Welcome Guys! Kesel Gediyak Kanawada </h1>
    <button class="glow-btn" onclick="alert('Supiri Wadak!')">Click Me</button>
  </div>
</body>
</html>
